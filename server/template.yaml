AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Job Application API (Express on Lambda)

Parameters:
  MongoDbUri:
    Type: String
    NoEcho: true
    Description: MongoDB Atlas connection string
  JwtSecret:
    Type: String
    NoEcho: true
    Description: JWT signing secret
  ClientOrigin:
    Type: String
    Description: Vercel frontend URL (comma-separated for multiple origins)
    Default: https://your-app.vercel.app

Globals:
  Function:
    Timeout: 30
    MemorySize: 512
    Runtime: nodejs20.x
    Architectures:
      - arm64

Resources:
  JobAppApi:
    Type: AWS::Serverless::HttpApi

  JobAppFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: lambda.handler
      CodeUri: .
      Description: Job Application Express API
      Environment:
        Variables:
          MONGODB_URI: !Ref MongoDbUri
          JWT_SECRET: !Ref JwtSecret
          CLIENT_ORIGIN: !Ref ClientOrigin
          MONGODB_TIMEOUT_MS: '30000'
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref JobAppApi
            Path: /{proxy+}
            Method: ANY
        ApiRoot:
          Type: HttpApi
          Properties:
            ApiId: !Ref JobAppApi
            Path: /
            Method: ANY
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Target: es2022
        Sourcemap: false
        EntryPoints:
          - lambda.js
        External:
          - '@aws-sdk/*'

Outputs:
  ApiUrl:
    Description: API Gateway endpoint URL
    Value: !Sub 'https://${JobAppApi}.execute-api.${AWS::Region}.amazonaws.com'
  HealthCheck:
    Description: Health check URL
    Value: !Sub 'https://${JobAppApi}.execute-api.${AWS::Region}.amazonaws.com/api/health'
